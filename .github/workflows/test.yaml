---
name: securefix
# on: push
on: workflow_dispatch
jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          repository: szksh-lab/securefix-demo-client-2
          persist-credentials: false
          path: securefix-demo-client-2

      - run: mkdir securefix-demo-client-2/foo
      - run: echo foooooo > securefix-demo-client-2/foo/foo.txt

      - uses: csm-actions/securefix-action@pr/426
        with:
          app_id: ${{vars.AUTOFIX_TRIGGER_APP_ID}}
          app_private_key: ${{secrets.AUTOFIX_TRIGGER_APP_PRIVATE_KEY}}
          server_repository: securefix-demo-server
          repository: szksh-lab/securefix-demo-client-2
          root_dir: securefix-demo-client-2
          branch: update-date-1
          commit_message: "Bump version"
          pull_request_base_branch: "main"
          pull_request_title: "Bump version"
          pull_request_body: "Bump version"
